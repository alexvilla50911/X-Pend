<svg xmlns="http://www.w3.org/2000/svg" width="320" height="640" viewBox="0 0 320 640" font-family="-apple-system, Helvetica, Arial, sans-serif">
  <rect width="320" height="640" rx="36" fill="#0b1120"/>
  <rect x="0" y="0" width="320" height="640" rx="36" fill="none" stroke="#253150" stroke-width="2"/>

  <text x="20" y="46" fill="#f1f5f9" font-size="22" font-weight="700">Tarjeta</text>

  <!-- credit card -->
  <defs>
    <radialGradient id="glow" cx="80%" cy="10%" r="60%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect x="18" y="62" width="284" height="130" rx="18" fill="#111827" stroke="#334155"/>
  <rect x="18" y="62" width="284" height="130" rx="18" fill="url(#glow)"/>
  <text x="36" y="90" fill="#94a3b8" font-size="11" letter-spacing="1">CRÉDITO</text>
  <text x="36" y="110" fill="#f1f5f9" font-size="15" font-weight="700">BANAMEX ORO</text>
  <text x="36" y="150" fill="#ffffff" font-size="26" font-weight="800">$2,150.00</text>
  <text x="36" y="172" fill="#94a3b8" font-size="11">Por pagar antes del 13 de agosto</text>

  <!-- stat row -->
  <rect x="18" y="206" width="136" height="64" rx="14" fill="#131b2e" stroke="#253150"/>
  <text x="30" y="228" fill="#94a3b8" font-size="10">Por pagar el 13 ago</text>
  <text x="30" y="252" fill="#f87171" font-size="16" font-weight="700">$2,150.00</text>

  <rect x="166" y="206" width="136" height="64" rx="14" fill="#131b2e" stroke="#253150"/>
  <text x="178" y="228" fill="#94a3b8" font-size="10">Gastado este periodo</text>
  <text x="178" y="252" fill="#f87171" font-size="16" font-weight="700">$980.00</text>

  <text x="20" y="296" fill="#64748a" font-size="10">Solo tarjeta · periodo de corte, no el mes calendario</text>

  <text x="20" y="330" fill="#94a3b8" font-size="11" font-weight="700" letter-spacing="0.5">CARGOS DE CONTADO (ESTE PERIODO)</text>

  <rect x="18" y="344" width="284" height="54" rx="14" fill="#131b2e" stroke="#253150"/>
  <text x="34" y="366" fill="#f1f5f9" font-size="13" font-weight="600">Salidas</text>
  <text x="34" y="384" fill="#64748a" font-size="11">5 jul · Cena</text>
  <text x="286" y="376" fill="#f87171" font-size="14" font-weight="700" text-anchor="end">-$980.00</text>

  <text x="20" y="428" fill="#94a3b8" font-size="11" font-weight="700" letter-spacing="0.5">A MESES SIN INTERESES</text>

  <rect x="18" y="442" width="284" height="42" rx="14" fill="#131b2e" stroke="#253150"/>
  <text x="34" y="467" fill="#f1f5f9" font-size="12" font-weight="600">2 activas · $610.00/mes</text>
  <text x="286" y="467" fill="#64748a" font-size="14" text-anchor="end">▾</text>

  <!-- bottom nav -->
  <rect x="0" y="576" width="320" height="64" fill="#131b2e"/>
  <line x1="0" y1="576" x2="320" y2="576" stroke="#253150"/>
  <g font-size="9" fill="#64748a" text-anchor="middle">
    <text x="42" y="612">Inicio</text>
    <text x="110" y="612">Gastos</text>
    <text x="178" y="612" fill="#10b981" font-weight="700">Tarjeta</text>
    <text x="246" y="612">Gráficas</text>
    <text x="290" y="612">Cuenta</text>
  </g>
